# ─── Ingress ──────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codeforge-ingress
  labels:
    app.kubernetes.io/name: {{ .Values.appname }}
    app.kubernetes.io/part-of: {{ .Values.appname }}

spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080

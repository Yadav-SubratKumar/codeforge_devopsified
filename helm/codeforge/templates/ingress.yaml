# ─── Ingress ──────────────────────────────────────────────────────────────────
# Requires: ingress-nginx controller + cert-manager with a ClusterIssuer named "letsencrypt-prod"
# For local dev (minikube/kind), remove the tls block and set host to a local domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codeforge-ingress
  labels:
    app.kubernetes.io/name: {{ .Values.appname }}
    app.kubernetes.io/part-of: {{ .Values.appname }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # API traffic → backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          # All other traffic → frontend (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

name: Security Scans

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'k8s/**'

  pull_request:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
jobs:
  # ─── Secret Detection ──────────────────────────────────────────
  gitleaks:
    name: Secret Detection (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history so GitLeaks scans all commits

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: codeforge
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: codeforge_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://codeforge:secret@localhost:5432/codeforge_db_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_secret_key
        run: npm test

#  ─── Frontend ───────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ─── Dependency Audit ───────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Audit worker dependencies
        working-directory: worker
        run: npm audit --audit-level=high

  # ─── SAST — Semgrep ─────────────────────────────────────────────
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/nodejs \
            --config=p/jwt \
            --config=p/express \
            --config=p/secrets \
            --config=p/owasp-top-ten \
            --error \
            --json \
            --output semgrep-report.json \
            backend/ worker/
        continue-on-error: true

      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  # ─── Container Scanning — Trivy ─────────────────────────────────
  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, gitleaks, semgrep]
    
    env:
      IMAGE_TAG: v1.${{ github.run_number }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/codeforge-worker:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_USERNAME }}/codeforge-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/codeforge-backend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_USERNAME }}/codeforge-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/codeforge-frontend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_USERNAME }}/codeforge-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/codeforge-worker:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/codeforge-backend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/codeforge-frontend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ─── OWASP Dependency Check ─────────────────────────────────────
  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: CodeForge
          path: .
          format: HTML
          args: >
            --failOnCVSS 8
            --enableRetired

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: reports/

  image-update:
    name: Update Kubernetes Image Tags
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: v1.${{ github.run_number }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update image tags in Kubernetes manifests
        run: |
          echo "Updating Kubernetes manifests with tag ${IMAGE_TAG}"

          sed -i "s|${DOCKERHUB_USERNAME}/codeforge-worker:.*|${DOCKERHUB_USERNAME}/codeforge-worker:${IMAGE_TAG}|g" k8s/worker.yaml
          sed -i "s|${DOCKERHUB_USERNAME}/codeforge-backend:.*|${DOCKERHUB_USERNAME}/codeforge-backend:${IMAGE_TAG}|g" k8s/backend.yaml
          sed -i "s|${DOCKERHUB_USERNAME}/codeforge-frontend:.*|${DOCKERHUB_USERNAME}/codeforge-frontend:${IMAGE_TAG}|g" k8s/frontend.yaml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add k8s/
          git commit -m "Update image tags to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
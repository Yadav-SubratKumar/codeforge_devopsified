# ⚠️  DO NOT commit real values to version control.
# Replace stringData values before applying, or use Sealed Secrets / External Secrets Operator.
apiVersion: v1
kind: Secret
metadata:
  name: codeforge-secrets
  namespace: codeforge
  labels:
    app.kubernetes.io/name: codeforge
type: Opaque
stringData:
  POSTGRES_USER: "codeforge"
  POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  POSTGRES_DB: "codeforge_db"
  JWT_SECRET: "CHANGE_ME_LONG_RANDOM_SECRET_256BIT"

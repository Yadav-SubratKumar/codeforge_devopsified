# ─── Ingress ──────────────────────────────────────────────────────────────────
# Requires: ingress-nginx controller + cert-manager with a ClusterIssuer named "letsencrypt-prod"
# For local dev (minikube/kind), remove the tls block and set host to a local domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codeforge-ingress
  namespace: codeforge
  labels:
    app.kubernetes.io/name: codeforge
    app.kubernetes.io/part-of: codeforge
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
